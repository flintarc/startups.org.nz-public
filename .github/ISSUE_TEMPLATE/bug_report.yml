name: Bug report
description: Something on startups.org.nz isn't working right.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve **startups.org.nz**! We're testing as we go, so a few rough edges are expected.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: I clicked ... and ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
  - type: input
    id: page
    attributes:
      label: Page / URL
      placeholder: https://startups.org.nz/board
  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Desktop
        - Mobile
        - Tablet
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome, Safari, Firefox, Edge ...
