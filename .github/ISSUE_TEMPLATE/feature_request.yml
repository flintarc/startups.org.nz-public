name: Feature request / idea
description: Suggest an improvement or something you'd like to see.
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      placeholder: It would be great if ...
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why would it help?
    validations:
      required: false
